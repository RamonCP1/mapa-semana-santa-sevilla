<style>
:root {
  --gold: #F5B731;
  --gold-dark: #C4941A;
  --gold-light: #FFF3D6;
  --burgundy: #6B1D2A;
  --charcoal: #1a1a1a;
  --text-dark: #2c2c2c;
  --text-muted: #6b6b6b;
  --bg-cream: #FDFBF7;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg-cream);
  color: var(--text-dark);
  overflow-x: hidden;
}

/* Controls */
.controls-section {
  padding: 20px 16px;
  background: var(--bg-cream);
}
.controls-inner { max-width: 100%; }
.day-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.day-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 12px;
  min-width: 90px;
  background: #fff;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  font-family: var(--font-body);
}
.day-btn:hover { border-color: var(--gold); background: var(--gold-light); }
.day-btn.active {
  background: var(--charcoal);
  border-color: var(--charcoal);
  color: #fff;
}
.day-btn-label { font-size: 13px; font-weight: 600; line-height: 1.2; }
.day-btn-date { font-size: 11px; opacity: 0.6; margin-top: 2px; }
.day-btn.active .day-btn-date { opacity: 0.8; }

.day-description {
  font-size: 14px;
  color: var(--text-muted);
  margin: 12px 0;
  line-height: 1.5;
}

.brotherhood-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.brotherhood-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: #fff;
  border: 1.5px solid #e0e0e0;
  border-radius: 20px;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.brotherhood-chip:hover { border-color: var(--gold); }
.brotherhood-chip.active { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }
.brotherhood-chip.dimmed { opacity: 0.35; }
.chip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Map */
.map-section { position: relative; width: 100%; }
#map { width: 100%; height: 500px; z-index: 1; }
.map-legend {
  position: absolute;
  bottom: 20px;
  left: 12px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  padding: 12px 16px;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  z-index: 1000;
  max-width: 220px;
  max-height: 300px;
  overflow-y: auto;
  font-size: 12px;
}
.legend-title { font-family: var(--font-display); font-size: 14px; color: var(--burgundy); margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; }
.legend-item:hover { opacity: 0.7; }
.legend-color { width: 14px; height: 4px; border-radius: 2px; flex-shrink: 0; }
.legend-carrera { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
.legend-carrera-line { width: 20px; height: 3px; background: var(--gold); border-radius: 1px; }

/* Popups */
.leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important; }
.leaflet-popup-content { margin: 0 !important; font-family: var(--font-body) !important; }
.popup-header { background: var(--charcoal); color: #fff; padding: 12px 16px; border-radius: 12px 12px 0 0; }
.popup-header h4 { font-family: var(--font-display); font-size: 15px; margin: 0; }
.popup-brotherhood { font-size: 12px; opacity: 0.7; margin-top: 2px; }
.popup-body { padding: 12px 16px; }
.popup-time { font-size: 20px; font-weight: 700; color: var(--burgundy); font-family: var(--font-display); }
.popup-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Info panel */
.info-section { padding: 24px 16px; background: #fff; border-top: 1px solid #eee; }
.info-inner { max-width: 100%; }
.info-title { font-family: var(--font-display); font-size: 20px; color: var(--charcoal); margin-bottom: 16px; padding-left: 12px; border-left: 4px solid var(--gold); }
.info-timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-stop { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-left: 2px solid #e0e0e0; margin-left: 8px; padding-left: 16px; position: relative; }
.timeline-stop.is-start { border-left-color: var(--burgundy); }
.timeline-stop.is-end { border-left-color: var(--charcoal); }
.timeline-stop.is-carrera { border-left-color: var(--gold); }
.timeline-dot-wrapper { position: absolute; left: -7px; top: 10px; }
.timeline-dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; border: 2px solid #fff; box-shadow: 0 0 0 2px #e0e0e0; }
.timeline-stop.is-start .timeline-dot { background: var(--burgundy); box-shadow: 0 0 0 2px var(--burgundy); }
.timeline-stop.is-end .timeline-dot { background: var(--charcoal); box-shadow: 0 0 0 2px var(--charcoal); }
.timeline-stop.is-carrera .timeline-dot { background: var(--gold); box-shadow: 0 0 0 2px var(--gold); }
.timeline-content { flex: 1; }
.timeline-time { font-size: 16px; font-weight: 700; color: var(--burgundy); font-family: var(--font-display); }
.timeline-name { font-size: 13px; color: var(--text-dark); margin-top: 2px; }
.timeline-stop.is-carrera .timeline-name { font-weight: 600; color: var(--gold-dark); }
.timeline-carrera-badge { display: inline-block; background: var(--gold-light); color: var(--gold-dark); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 8px; text-transform: uppercase; }

.custom-marker { display: flex; align-items: center; justify-content: center; }
.marker-start, .marker-end { width: 20px; height: 20px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
.marker-waypoint { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
</style>
</head>

<script>
// ============================================
// MAPA INTERACTIVO - PROCESIONES SEMANA SANTA SEVILLA 2026
// ============================================

// --- STATE ---
let currentDay = "Domingo de Ramos";
let selectedBrotherhood = null; // null = all visible
let map;
let routeLayers = [];
let markerLayers = [];
let carreraLayer = null;

// --- CARRERA OFICIAL (approximate route through the center) ---
const CARRERA_OFICIAL = [
  [37.3907, -5.9965],  // Campana
  [37.3900, -5.9962],  // Sierpes start
  [37.3893, -5.9960],
  [37.3888, -5.9958],
  [37.3882, -5.9955],
  [37.3878, -5.9952],
  [37.3872, -5.9948],
  [37.3867, -5.9945],
  [37.3862, -5.9940],
  [37.3858, -5.9935],  // Plaza
  [37.3856, -5.9929],  // San Miguel
  [37.3854, -5.9924],
  [37.3853, -5.9918],  // Puerta de Palos
];

// --- INIT MAP ---
function initMap() {
  map = L.map('map', {
    center: [37.3880, -5.9940],
    zoom: 15,
    zoomControl: true,
    scrollWheelZoom: true,
    attributionControl: true
  });

  // Tile layer - clean style
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Draw carrera oficial
  drawCarreraOficial();

  // Initial render
  renderDay(currentDay);
}

function drawCarreraOficial() {
  if (carreraLayer) {
    map.removeLayer(carreraLayer);
  }
  carreraLayer = L.polyline(CARRERA_OFICIAL, {
    color: '#F5B731',
    weight: 6,
    opacity: 0.8,
    dashArray: '12 6',
    lineCap: 'round'
  }).addTo(map);

  // Add label
  const midPoint = CARRERA_OFICIAL[Math.floor(CARRERA_OFICIAL.length / 2)];
  L.marker(midPoint, {
    icon: L.divIcon({
      className: 'carrera-label',
      html: '<div style="background:rgba(245,183,49,0.9);color:#1a1a1a;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;font-family:Source Sans 3,sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.15);">Carrera Oficial</div>',
      iconSize: [100, 24],
      iconAnchor: [50, 12]
    })
  }).addTo(map);
}

// --- RENDER DAY ---
function renderDay(dayName) {
  currentDay = dayName;
  selectedBrotherhood = null;

  // Update button states
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.day === dayName);
  });

  // Update description
  const dayData = PROCESSIONS[dayName];
  document.getElementById('dayDescription').textContent = dayData.description;

  // Render brotherhood chips
  renderBrotherhoodChips(dayData.hermandades);

  // Render routes on map
  renderRoutes(dayData.hermandades);

  // Render legend
  renderLegend(dayData.hermandades);

  // Hide info section
  document.getElementById('infoSection').style.display = 'none';

  // Fit map to routes
  fitMapToRoutes(dayData.hermandades);
}

// --- BROTHERHOOD CHIPS ---
function renderBrotherhoodChips(hermandades) {
  const container = document.getElementById('brotherhoodChips');
  container.innerHTML = '';

  // "All" chip
  const allChip = document.createElement('button');
  allChip.className = 'brotherhood-chip active';
  allChip.innerHTML = '<span class="chip-dot" style="background:var(--gold)"></span>Todas';
  allChip.addEventListener('click', () => {
    selectedBrotherhood = null;
    updateChipStates();
    renderRoutes(PROCESSIONS[currentDay].hermandades);
    document.getElementById('infoSection').style.display = 'none';
    fitMapToRoutes(PROCESSIONS[currentDay].hermandades);
  });
  container.appendChild(allChip);

  hermandades.forEach((h, i) => {
    const color = BROTHERHOOD_COLORS[i % BROTHERHOOD_COLORS.length];
    const chip = document.createElement('button');
    chip.className = 'brotherhood-chip';
    chip.innerHTML = `<span class="chip-dot" style="background:${color}"></span>${h.name}`;
    chip.addEventListener('click', () => {
      selectedBrotherhood = h.name;
      updateChipStates();
      renderRoutes(PROCESSIONS[currentDay].hermandades, h.name);
      showBrotherhoodInfo(h, color);
      fitMapToSingleRoute(h);
    });
    container.appendChild(chip);
  });
}

function updateChipStates() {
  document.querySelectorAll('.brotherhood-chip').forEach((chip, idx) => {
    if (idx === 0) {
      // "All" chip
      chip.classList.toggle('active', selectedBrotherhood === null);
      chip.classList.remove('dimmed');
    } else {
      const isSelected = selectedBrotherhood === null || chip.textContent.trim() === selectedBrotherhood;
      chip.classList.toggle('active', chip.textContent.trim() === selectedBrotherhood);
      chip.classList.toggle('dimmed', selectedBrotherhood !== null && chip.textContent.trim() !== selectedBrotherhood);
    }
  });
}

// --- RENDER ROUTES ---
function renderRoutes(hermandades, highlightName = null) {
  // Clear existing
  routeLayers.forEach(l => map.removeLayer(l));
  markerLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];
  markerLayers = [];

  hermandades.forEach((h, i) => {
    const color = BROTHERHOOD_COLORS[i % BROTHERHOOD_COLORS.length];
    const isHighlighted = highlightName === null || h.name === highlightName;
    const opacity = isHighlighted ? 0.85 : 0.15;
    const weight = isHighlighted ? 4 : 2;

    // Draw route polyline
    const coords = h.waypoints.map(wp => wp.coords);
    const polyline = L.polyline(coords, {
      color: color,
      weight: weight,
      opacity: opacity,
      lineJoin: 'round',
      lineCap: 'round'
    }).addTo(map);
    routeLayers.push(polyline);

    // Draw markers only for highlighted routes
    if (isHighlighted && (highlightName !== null || hermandades.length <= 3)) {
      h.waypoints.forEach((wp, wpIdx) => {
        const isStart = wpIdx === 0;
        const isEnd = wpIdx === h.waypoints.length - 1;
        let markerSize, markerClass;

        if (isStart || isEnd) {
          markerSize = 20;
          markerClass = isStart ? 'marker-start' : 'marker-end';
        } else {
          markerSize = 10;
          markerClass = 'marker-waypoint';
        }

        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div class="${markerClass}" style="background:${color};${isStart || isEnd ? '' : `border-color:${color};background:white;`}">
            ${isStart ? '▶' : isEnd ? '■' : ''}
          </div>`,
          iconSize: [markerSize, markerSize],
          iconAnchor: [markerSize/2, markerSize/2]
        });

        const marker = L.marker(wp.coords, { icon: icon }).addTo(map);

        // Popup
        const popupContent = `
          <div class="popup-header">
            <h4>${wp.name}</h4>
            <div class="popup-brotherhood">${h.name}</div>
          </div>
          <div class="popup-body">
            <div class="popup-time">${wp.time} h</div>
            <div class="popup-label">${isStart ? 'Hora de salida' : isEnd ? 'Hora de entrada' : 'Paso de Cruz de Guía'}</div>
          </div>
        `;
        marker.bindPopup(popupContent, { className: 'custom-popup' });

        markerLayers.push(marker);
      });
    } else if (highlightName === null) {
      // Show start markers only when viewing all
      const startWp = h.waypoints[0];
      const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-start" style="background:${color};">▶</div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
      const marker = L.marker(startWp.coords, { icon: icon }).addTo(map);
      marker.bindPopup(`
        <div class="popup-header">
          <h4>${h.name}</h4>
          <div class="popup-brotherhood">Salida: ${startWp.time} h</div>
        </div>
        <div class="popup-body">
          <div class="popup-time">${startWp.time} h</div>
          <div class="popup-label">Hora de salida</div>
        </div>
      `, { className: 'custom-popup' });
      marker.on('click', () => {
        selectedBrotherhood = h.name;
        updateChipStates();
        renderRoutes(PROCESSIONS[currentDay].hermandades, h.name);
        showBrotherhoodInfo(h, color);
        fitMapToSingleRoute(h);
      });
      markerLayers.push(marker);
    }
  });
}

// --- FIT MAP ---
function fitMapToRoutes(hermandades) {
  const allCoords = [];
  hermandades.forEach(h => {
    h.waypoints.forEach(wp => {
      allCoords.push(wp.coords);
    });
  });
  if (allCoords.length > 0) {
    const bounds = L.latLngBounds(allCoords);
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
  }
}

function fitMapToSingleRoute(hermandad) {
  const coords = hermandad.waypoints.map(wp => wp.coords);
  if (coords.length > 0) {
    const bounds = L.latLngBounds(coords);
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });
  }
}

// --- LEGEND ---
function renderLegend(hermandades) {
  const container = document.getElementById('legendItems');
  container.innerHTML = '';

  hermandades.forEach((h, i) => {
    const color = BROTHERHOOD_COLORS[i % BROTHERHOOD_COLORS.length];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-color" style="background:${color}"></span>${h.name}`;
    item.addEventListener('click', () => {
      selectedBrotherhood = h.name;
      updateChipStates();
      renderRoutes(PROCESSIONS[currentDay].hermandades, h.name);
      showBrotherhoodInfo(h, color);
      fitMapToSingleRoute(h);
    });
    container.appendChild(item);
  });
}

// --- INFO PANEL ---
function showBrotherhoodInfo(hermandad, color) {
  const section = document.getElementById('infoSection');
  const title = document.getElementById('infoTitle');
  const timeline = document.getElementById('infoTimeline');

  section.style.display = 'block';
  title.textContent = `${hermandad.name} — Recorrido completo`;
  title.style.borderColor = color;

  // Carrera oficial points
  const carreraPoints = ['Campana', 'Sierpes', 'Plaza', 'Puerta de San Miguel', 'San Miguel', 'Puerta de Palos', 'Palos'];

  timeline.innerHTML = hermandad.waypoints.map((wp, idx) => {
    const isStart = idx === 0;
    const isEnd = idx === hermandad.waypoints.length - 1;
    const isCarrera = carreraPoints.some(cp => wp.name.includes(cp));
    let className = 'timeline-stop';
    if (isStart) className += ' is-start';
    else if (isEnd) className += ' is-end';
    else if (isCarrera) className += ' is-carrera';

    return `
      <div class="${className}">
        <div class="timeline-dot-wrapper">
          <div class="timeline-dot" ${isStart || isEnd ? '' : isCarrera ? '' : `style="background:${color};box-shadow:0 0 0 2px ${color}"`}></div>
        </div>
        <div class="timeline-content">
          <div class="timeline-time">${wp.time} h</div>
          <div class="timeline-name">
            ${wp.name}
            ${isCarrera && !isStart && !isEnd ? '<span class="timeline-carrera-badge">Carrera Oficial</span>' : ''}
            ${isStart ? '<span class="timeline-carrera-badge" style="background:#f0e6e8;color:#6B1D2A;">Salida</span>' : ''}
            ${isEnd ? '<span class="timeline-carrera-badge" style="background:#e8e8e8;color:#1a1a1a;">Entrada</span>' : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Scroll to info
  setTimeout(() => {
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

// --- EVENT LISTENERS ---
function setupEventListeners() {
  // Day selector buttons
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      renderDay(btn.dataset.day);
    });
  });
}

// --- INIT ---
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  setupEventListeners();
});

  </script>
